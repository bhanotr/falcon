version: "3.8"

services:
  db:
    image: docker.io/library/postgres:15-alpine
    container_name: falcon_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: falcon
      POSTGRES_PASSWORD: falconpass
      POSTGRES_DB: falcon_university
    network_mode: host
    volumes:
      - falcon_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U falcon -d falcon_university"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: localhost/falcon-backend:latest
    container_name: falcon_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://falcon:falconpass@localhost:5432/falcon_university
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey}
    network_mode: host
    depends_on:
      - db
    volumes:
      - falcon_uploads:/app/uploads
      - falcon_chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "python", "app/healthcheck.py"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  llm-gateway:
    build:
      context: ./llm-gateway
      dockerfile: Dockerfile
    image: localhost/falcon-llm-gateway:latest
    container_name: falcon_llm_gateway
    restart: unless-stopped
    network_mode: host
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/v1/models || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama-embedding:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    image: localhost/falcon-ollama:latest
    container_name: falcon_ollama_embedding
    restart: unless-stopped
    network_mode: host
    environment:
      OLLAMA_HOST: 0.0.0.0:11435
      MODEL_NAME: embeddinggemma:300m
    volumes:
      - falcon_ollama_embedding:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11435/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  falcon_postgres_data:
  falcon_uploads:
  falcon_chroma_data:
  falcon_ollama_embedding:
